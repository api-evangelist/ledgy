specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Ledgy
providerId: ledgy
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Equity Management
- Cap Table
- ESOP
- Stakeholders
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Ledgy spend. Ledgy is a sales-led SaaS subscription, billed
  annually per company stage and stakeholder count rather than per API call.
  The GraphQL API is included with the subscription and is not separately
  metered or billed, so there are no usage-based cost meters to allocate at the
  API level. Cost management is primarily contract / seat / stakeholder
  management against the negotiated subscription.
notes: >-
  No public usage-based API pricing exists; subscription amounts are negotiated
  with Ledgy sales. Treat the billing model below as subscription/flat and
  verify the contracted figure during reconciliation.
sources:
- https://www.ledgy.com/pricing
- https://docs.ledgy.com/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Ledgy
serviceCategory: Management and Governance
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: EUR
  chargeCategories:
  - Purchase
  - Usage
meters:
- name: subscription
  description: >-
    Annual platform subscription, quoted by company stage and stakeholder
    count. Not API-call metered.
  unit: subscription
  aggregation: sum
  dimensions:
  - company
  - plan
- name: stakeholders
  description: >-
    Active stakeholders managed on the cap table, the primary scaling dimension
    Ledgy uses to size a subscription tier.
  unit: stakeholders
  aggregation: max
  dimensions:
  - company
principles:
- name: Visibility
  description: >-
    Track the negotiated annual subscription and the stakeholder count that
    drives the tier; the GraphQL API itself carries no incremental usage charge.
- name: Allocation
  description: Map the Ledgy subscription to the finance / legal / people cost center that owns equity.
- name: Optimization
  description: >-
    Right-size the plan to actual stakeholder count at renewal; avoid
    over-provisioning enterprise add-ons (SSO, custom integrations) that are
    not used.
- name: Accountability
  description: Assign a single owner for the Ledgy contract and review at annual renewal.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
